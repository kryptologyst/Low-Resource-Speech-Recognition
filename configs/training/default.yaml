# @package training
_target_: src.train.trainer.Trainer

# Training configuration
epochs: 100
max_steps: -1  # -1 for no limit
gradient_accumulation_steps: 1
max_grad_norm: 1.0

# Optimization
optimizer:
  _target_: torch.optim.AdamW
  lr: 1e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]
  eps: 1e-8

# Learning rate scheduling
scheduler:
  _target_: transformers.get_linear_schedule_with_warmup
  num_warmup_steps: 1000
  num_training_steps: 10000

# Loss configuration
loss:
  ctc_weight: 0.3
  attention_weight: 0.7
  label_smoothing: 0.1

# Checkpointing
checkpointing:
  save_every_n_epochs: 5
  save_best: true
  monitor: "val_wer"
  mode: "min"
  save_top_k: 3
  filename: "epoch_{epoch:02d}-wer_{val_wer:.4f}"

# Early stopping
early_stopping:
  enabled: true
  patience: 10
  monitor: "val_wer"
  mode: "min"
  min_delta: 0.001

# Validation
validation:
  val_check_interval: 1.0  # Run validation every N epochs
  val_check_interval_unit: "epoch"

# Mixed precision
mixed_precision:
  enabled: true
  precision: "16-mixed"  # 16-mixed, 32, 64

# Logging
logging:
  log_every_n_steps: 100
  log_images: false
  log_audio: false
  log_text: true

# Reproducibility
deterministic: true
seed: 42
